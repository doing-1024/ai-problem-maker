name: Sync to Hugging Face Hub

on:
  push:
    branches: [main] # 触发同步的分支，如果您的默认分支是 master 请修改

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true # 如果您仓库中使用了 Git LFS，请开启此项

      - name: Sync to Hugging Face Hub
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: doing1024001/ai-problem-maker # 替换为您的 HF 用户名/Space名称
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: docker
